<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura Puzzle Pro | by Nabin Budha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05080f;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.5);
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
        }

        /* Dynamic Themes */
        .theme-indigo { --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.4); }
        .theme-emerald { --accent: #10b981; --accent-glow: rgba(16, 185, 129, 0.4); }
        .theme-rose { --accent: #f43f5e; --accent-glow: rgba(244, 63, 94, 0.4); }
        .theme-amber { --accent: #f59e0b; --accent-glow: rgba(245, 158, 11, 0.4); }

        body {
            font-family: 'Plus+Jakarta+Sans', sans-serif;
            background-color: var(--bg-dark);
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease;
        }

        /* Ambient Floating Orbs */
        .ambient-orbs {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
            background: var(--accent);
            transition: background 1s ease;
        }
        .orb-1 { width: 350px; height: 350px; top: -10%; left: -10%; }
        .orb-2 { width: 450px; height: 450px; bottom: -20%; right: -10%; animation-delay: -5s; opacity: 0.2; }
        
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 80px) scale(1.2); }
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight); /* Beveled glass look */
            border-radius: 32px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.9), inset 0 2px 20px rgba(255,255,255,0.02);
        }

        .game-grid-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            aspect-ratio: 1/1;
            margin: 0 auto;
            touch-action: none;
        }

        /* Premium 3D Beveled Tiles */
        .tile {
            position: absolute;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.3); /* 3D top edge highlight */
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            cursor: grab;
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, background 0.3s;
            user-select: none;
            box-sizing: border-box;
            z-index: 10;
            box-shadow: 4px 4px 15px rgba(0, 0, 0, 0.3), inset -2px -2px 10px rgba(0,0,0,0.2);
            will-change: transform;
        }

        .tile:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%);
            box-shadow: 6px 6px 20px rgba(0, 0, 0, 0.4), inset -2px -2px 10px rgba(0,0,0,0.2);
        }

        .tile:active { 
            cursor: grabbing; 
            z-index: 20; 
            transform: scale(0.95) !important; /* Squish effect on press */
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5), inset 2px 2px 10px rgba(0,0,0,0.3);
        }

        .tile.correct {
            border-color: rgba(16, 185, 129, 0.6);
            border-top: 1px solid rgba(16, 185, 129, 0.8);
            color: #34d399;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15) 0%, transparent 100%);
            box-shadow: inset 0 0 20px rgba(16, 185, 129, 0.15), 4px 4px 15px rgba(0,0,0,0.3);
        }

        /* Controls */
        .btn-mode {
            padding: 8px 0;
            width: 66px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 800;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.02);
            color: #64748b;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .btn-mode span.difficulty { font-size: 8px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; }
        .btn-mode.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
            border-top: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 20px -5px var(--accent-glow);
            transform: translateY(-2px);
        }

        .theme-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .theme-dot:hover { transform: scale(1.3); }
        .theme-dot.active { border-color: white; transform: scale(1.2); box-shadow: 0 0 10px var(--accent-glow); }

        .icon-btn { cursor: pointer; opacity: 0.6; transition: all 0.2s; }
        .icon-btn:hover { opacity: 1; transform: scale(1.1); }

        #winModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(5, 8, 15, 0.85);
            backdrop-filter: blur(20px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.1); backdrop-filter: blur(0px); }
            to { opacity: 1; transform: scale(1); backdrop-filter: blur(20px); }
        }

        .confetti { position: absolute; pointer-events: none; z-index: 99; animation: confettiFall 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes confettiFall {
            0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 1; }
            10% { transform: translate(calc(var(--tx) * 0.2), calc(var(--ty) * 0.2)) rotate(45deg) scale(1); }
            100% { transform: translate(var(--tx), var(--ty)) rotate(720deg) scale(0.5); opacity: 0; }
        }

        @media (max-width: 480px) {
            .game-grid-container { max-width: 88vw; }
            .tile { font-size: 1.4rem; border-radius: 12px; }
            .btn-mode { width: 56px; padding: 6px 0; font-size: 11px; }
        }
    </style>
</head>
<body class="theme-indigo">
    <!-- Premium Ambient Lighting -->
    <div class="ambient-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="w-full max-w-md px-5">
        <!-- Header -->
        <header class="text-center mb-6 relative">
            <div class="absolute right-0 top-0 icon-btn" onclick="toggleSound()" title="Toggle Sound">
                <svg id="soundIcon" class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586l3.707 3.707A1 1 0 0015 19V5a1 1 0 00-1.707-.707L9.586 8H7a2 2 0 00-2 2z"></path>
                </svg>
            </div>

            <h1 class="text-4xl font-extrabold tracking-tighter mb-1 bg-clip-text text-transparent bg-gradient-to-b from-white via-white to-slate-500 drop-shadow-lg">
                AURA PUZZLE
            </h1>
            <p class="text-[var(--accent)] text-[9px] font-black uppercase tracking-[0.45em] mb-5 opacity-90">Crafted by Nabin Budha</p>
            
            <div class="flex justify-between items-center bg-white/[0.03] p-2.5 rounded-2xl border border-white/[0.05] shadow-inner">
                <div class="flex gap-2">
                    <button onclick="changeDifficulty(3)" id="mode-3" class="btn-mode">
                        3x3
                        <span class="difficulty">Easy</span>
                    </button>
                    <button onclick="changeDifficulty(4)" id="mode-4" class="btn-mode active">
                        4x4
                        <span class="difficulty">Medium</span>
                    </button>
                    <button onclick="changeDifficulty(5)" id="mode-5" class="btn-mode">
                        5x5
                        <span class="difficulty">Hard</span>
                    </button>
                </div>
                <div class="flex gap-2.5 px-3 border-l border-white/10">
                    <div onclick="setTheme('indigo')" class="theme-dot bg-indigo-500 active" data-theme="indigo"></div>
                    <div onclick="setTheme('emerald')" class="theme-dot bg-emerald-500" data-theme="emerald"></div>
                    <div onclick="setTheme('rose')" class="theme-dot bg-rose-500" data-theme="rose"></div>
                    <div onclick="setTheme('amber')" class="theme-dot bg-amber-500" data-theme="amber"></div>
                </div>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4 mb-6 relative">
            <div class="glass-panel py-3.5 text-center rounded-2xl">
                <div class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-1">Moves</div>
                <div id="moveCount" class="text-2xl font-bold text-white tracking-tight">0</div>
            </div>
            <div class="glass-panel py-3.5 text-center rounded-2xl">
                <div class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-1">Time</div>
                <div id="timer" class="text-2xl font-bold text-[var(--accent)] tracking-tight drop-shadow-md">00:00</div>
            </div>
            <div class="glass-panel py-3.5 text-center rounded-2xl group">
                <div class="text-[9px] text-slate-400 uppercase font-black tracking-widest mb-1">Best</div>
                <div id="bestScore" class="text-2xl font-bold text-white tracking-tight opacity-70">--</div>
            </div>
        </div>

        <!-- Board -->
        <div class="glass-panel p-2.5 shadow-2xl">
            <div id="gridContainer" class="game-grid-container">
                <!-- Tiles injected by JS -->
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-8 flex gap-3">
            <button onclick="initGame(true)" class="flex-1 py-4 rounded-2xl font-bold text-white uppercase tracking-[0.2em] text-xs bg-[var(--accent)] shadow-[0_0_20px_var(--accent-glow)] hover:brightness-110 active:scale-95 transition-all border-t border-white/30">
                Reshuffle Board
            </button>
        </div>
        
        <p class="text-center text-[10px] text-slate-500 mt-4 tracking-wider uppercase font-bold opacity-60">
            Use Arrow Keys, W A S D, or Swipe to Move
        </p>
    </div>

    <!-- Win Modal -->
    <div id="winModal">
        <div class="glass-panel p-10 text-center max-w-sm w-full mx-4 border-white/20 shadow-[0_0_50px_var(--accent-glow)]">
            <div class="text-7xl mb-6 drop-shadow-2xl animate-bounce">🏆</div>
            <h2 class="text-3xl font-extrabold text-white mb-2 tracking-tight">Brilliant!</h2>
            <p class="text-[var(--accent)] text-[10px] font-black uppercase tracking-[0.4em] mb-5">Puzzle Conquered</p>
            
            <div class="bg-black/20 rounded-xl p-4 mb-8 border border-white/5">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-slate-400 text-sm font-semibold">Total Moves</span>
                    <span id="finalMoves" class="text-white font-bold text-xl">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-slate-400 text-sm font-semibold">Time Elapsed</span>
                    <span id="finalTime" class="text-[var(--accent)] font-bold text-xl">00:00</span>
                </div>
            </div>

            <button onclick="closeModal()" class="w-full py-4 rounded-xl font-bold bg-[var(--accent)] text-white shadow-lg shadow-[var(--accent-glow)] hover:brightness-110 active:scale-95 transition-all border-t border-white/30 tracking-widest uppercase text-sm">
                Next Challenge
            </button>
        </div>
    </div>

    <script>
        // Data Persistence (Auto-Save)
        const STORAGE_KEY_SCORES = 'aura_best_scores';
        const STORAGE_KEY_THEME = 'aura_theme';
        
        let bestScores = { 3: '--', 4: '--', 5: '--' };
        
        function loadSavedData() {
            try {
                const savedScores = localStorage.getItem(STORAGE_KEY_SCORES);
                if (savedScores) bestScores = JSON.parse(savedScores);
                
                const savedTheme = localStorage.getItem(STORAGE_KEY_THEME);
                if (savedTheme) setTheme(savedTheme);
            } catch (e) {
                console.log('Local storage not accessible.');
            }
        }

        function saveScores() {
            try {
                localStorage.setItem(STORAGE_KEY_SCORES, JSON.stringify(bestScores));
            } catch (e) {
                console.log('Could not save scores.');
            }
        }

        // Premium Sound & Haptic Engine
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let soundEnabled = true;

        function toggleSound() {
            soundEnabled = !soundEnabled;
            const icon = document.getElementById('soundIcon');
            if(soundEnabled) {
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10v4a2 2 0 002 2h2.586l3.707 3.707A1 1 0 0015 19V5a1 1 0 00-1.707-.707L9.586 8H7a2 2 0 00-2 2z"></path>`;
            } else {
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" clip-rule="evenodd" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2" />`;
            }
        }

        function playTone(freq, duration, type = 'sine', volume = 0.05) {
            if (!soundEnabled) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function triggerHaptic() {
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(15);
            }
        }

        let size = 4;
        let tiles = []; 
        let tileElements = {}; 
        let moves = 0;
        let timer = 0;
        let timerInterval;
        let isGameStarted = false;
        let isGameOver = false;

        const gridContainer = document.getElementById('gridContainer');
        const moveDisplay = document.getElementById('moveCount');
        const timerDisplay = document.getElementById('timer');
        const bestDisplay = document.getElementById('bestScore');

        let dragStartX, dragStartY;

        function setTheme(theme) {
            document.body.className = `theme-${theme}`;
            document.querySelectorAll('.theme-dot').forEach(dot => {
                dot.classList.toggle('active', dot.dataset.theme === theme);
            });
            try {
                localStorage.setItem(STORAGE_KEY_THEME, theme);
            } catch (e) {}
        }

        function changeDifficulty(n) {
            size = n;
            document.querySelectorAll('.btn-mode').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${n}`).classList.add('active');
            initGame(true);
        }

        // Premium Confetti Explosion
        function createConfetti() {
            const colors = ['#ffffff', '#6366f1', '#a855f7', '#34d399', '#f59e0b', '#f43f5e'];
            for(let i = 0; i < 80; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti';
                
                const size = Math.random() * 8 + 4;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                if(Math.random() > 0.5) particle.style.borderRadius = '50%';
                
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = '50%';
                particle.style.top = '50%';
                particle.style.boxShadow = `0 0 10px ${particle.style.backgroundColor}`;
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 100 + Math.random() * 400;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity + 100;
                
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 2500);
            }
        }

        function initGame(animateLoad = false) {
            isGameOver = false;
            tiles = Array.from({ length: size * size - 1 }, (_, i) => i + 1);
            tiles.push(null);
            shuffle();
            moves = 0;
            timer = 0;
            isGameStarted = false;
            clearInterval(timerInterval);
            
            moveDisplay.innerText = moves;
            bestDisplay.innerText = bestScores[size];
            updateTimerDisplay();
            setupBoard(animateLoad);
        }

        function shuffle() {
            do {
                for (let i = tiles.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
                }
            } while (!isSolvable() || isSolved());
        }

        function isSolvable() {
            let inversions = 0;
            const flat = tiles.filter(t => t !== null);
            for (let i = 0; i < flat.length; i++) {
                for (let j = i + 1; j < flat.length; j++) {
                    if (flat[i] > flat[j]) inversions++;
                }
            }
            const emptyIdx = tiles.indexOf(null);
            const emptyRowFromBottom = size - Math.floor(emptyIdx / size);
            if (size % 2 !== 0) return inversions % 2 === 0;
            return (inversions % 2 === 0) !== (emptyRowFromBottom % 2 === 0);
        }

        function setupBoard(animateLoad) {
            gridContainer.innerHTML = '';
            tileElements = {};
            const gap = 10;
            const containerWidth = gridContainer.clientWidth;
            const tileSize = (containerWidth - (size + 1) * gap) / size;

            tiles.forEach((tileNum, index) => {
                if (tileNum !== null) {
                    const div = document.createElement('div');
                    div.className = 'tile';
                    div.style.width = `${tileSize}px`;
                    div.style.height = `${tileSize}px`;
                    div.innerText = tileNum;
                    
                    div.onmousedown = (e) => startDrag(e.clientX, e.clientY, tileNum);
                    div.ontouchstart = (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY, tileNum);
                    div.onclick = () => handleTileInteraction(tileNum);

                    gridContainer.appendChild(div);
                    tileElements[tileNum] = div;
                }
            });
            updatePositions(animateLoad);
        }

        function updatePositions(stagger = false) {
            const gap = 10;
            const containerWidth = gridContainer.clientWidth;
            const tileSize = (containerWidth - (size + 1) * gap) / size;

            tiles.forEach((tileNum, index) => {
                if (tileNum !== null) {
                    const row = Math.floor(index / size);
                    const col = index % size;
                    const x = col * (tileSize + gap) + gap;
                    const y = row * (tileSize + gap) + gap;
                    
                    const el = tileElements[tileNum];
                    
                    if (stagger) {
                        el.style.transition = 'none';
                        el.style.transform = `translate(${x}px, ${y}px) scale(0.5)`;
                        el.style.opacity = '0';
                        
                        setTimeout(() => {
                            el.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s, box-shadow 0.3s, background 0.3s';
                            el.style.transform = `translate(${x}px, ${y}px) scale(1)`;
                            el.style.opacity = '1';
                        }, index * 25);
                    } else {
                        el.style.transform = `translate(${x}px, ${y}px) scale(1)`;
                    }
                    
                    el.classList.toggle('correct', tileNum === index + 1);
                }
            });
        }

        // Keyboard Pro Controls (Arrow Keys & WASD)
        window.addEventListener('keydown', (e) => {
            if (isGameOver) return;
            const key = e.key.toLowerCase();
            const emptyIdx = tiles.indexOf(null);
            let targetIdx = -1;

            if (key === 'arrowup' || key === 'w') {
                targetIdx = emptyIdx + size; // Move tile BELOW the empty space UP
            } else if (key === 'arrowdown' || key === 's') {
                targetIdx = emptyIdx - size; // Move tile ABOVE the empty space DOWN
            } else if (key === 'arrowleft' || key === 'a') {
                if (emptyIdx % size !== size - 1) targetIdx = emptyIdx + 1; // Move tile RIGHT of empty space LEFT
            } else if (key === 'arrowright' || key === 'd') {
                if (emptyIdx % size !== 0) targetIdx = emptyIdx - 1; // Move tile LEFT of empty space RIGHT
            }

            if (targetIdx >= 0 && targetIdx < size * size) {
                // Prevent scrolling if using arrow keys
                if (key.startsWith('arrow')) e.preventDefault();
                handleTileInteraction(tiles[targetIdx]);
                
                // Visual Press Effect for Keyboard
                const el = tileElements[tiles[targetIdx]];
                if (el) {
                    el.style.transform = el.style.transform.replace('scale(1)', 'scale(0.92)');
                    setTimeout(() => updatePositions(false), 150);
                }
            }
        });

        function startDrag(x, y, tileNum) {
            if (isGameOver) return;
            dragStartX = x;
            dragStartY = y;
            
            const el = tileElements[tileNum];
            el.style.transform = el.style.transform.replace('scale(1)', 'scale(0.95)');
            
            const handleEnd = (endX, endY) => {
                const dx = endX - dragStartX;
                const dy = endY - dragStartY;
                const threshold = 25;

                if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
                    const index = tiles.indexOf(tileNum);
                    if (Math.abs(dx) > Math.abs(dy)) {
                        if (dx > 0) attemptMove(index, 'right');
                        else attemptMove(index, 'left');
                    } else {
                        if (dy > 0) attemptMove(index, 'down');
                        else attemptMove(index, 'up');
                    }
                } else {
                    updatePositions(false); 
                }
                
                window.removeEventListener('mouseup', mouseUpHandler);
                window.removeEventListener('touchend', touchEndHandler);
            };

            const mouseUpHandler = (e) => handleEnd(e.clientX, e.clientY);
            const touchEndHandler = (e) => handleEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);

            window.addEventListener('mouseup', mouseUpHandler);
            window.addEventListener('touchend', touchEndHandler);
        }

        function attemptMove(index, direction) {
            const emptyIdx = tiles.indexOf(null);
            let targetIdx = -1;
            if (direction === 'up') targetIdx = index - size;
            if (direction === 'down') targetIdx = index + size;
            if (direction === 'left') targetIdx = index - 1;
            if (direction === 'right') targetIdx = index + 1;

            if (targetIdx === emptyIdx) {
                handleTileInteraction(tiles[index]);
            } else {
                updatePositions(false);
            }
        }

        function handleTileInteraction(tileNum) {
            if (isGameOver) return;
            const index = tiles.indexOf(tileNum);
            const emptyIdx = tiles.indexOf(null);
            
            const r = Math.floor(index / size), c = index % size;
            const er = Math.floor(emptyIdx / size), ec = emptyIdx % size;

            if (Math.abs(r - er) + Math.abs(c - ec) === 1) {
                if (!isGameStarted) {
                    isGameStarted = true;
                    if(audioCtx.state === 'suspended') audioCtx.resume();
                    timerInterval = setInterval(() => {
                        timer++;
                        updateTimerDisplay();
                    }, 1000);
                }
                
                [tiles[index], tiles[emptyIdx]] = [tiles[emptyIdx], tiles[index]];
                moves++;
                moveDisplay.innerText = moves;
                
                triggerHaptic();
                playTone(300 + (tileNum * 15), 0.08, 'sine', 0.04);
                
                updatePositions(false);
                
                if (isSolved()) endGame();
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(timer / 60).toString().padStart(2, '0');
            const s = (timer % 60).toString().padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }

        function isSolved() {
            return tiles.slice(0, -1).every((t, i) => t === i + 1);
        }

        function endGame() {
            isGameOver = true;
            isGameStarted = false;
            clearInterval(timerInterval);
            
            setTimeout(() => playTone(523.25, 0.15, 'triangle', 0.08), 0);
            setTimeout(() => playTone(659.25, 0.15, 'triangle', 0.08), 150);
            setTimeout(() => playTone(783.99, 0.15, 'triangle', 0.08), 300);
            setTimeout(() => playTone(1046.50, 0.4, 'triangle', 0.1), 450);

            createConfetti();

            if (bestScores[size] === '--' || moves < bestScores[size]) {
                bestScores[size] = moves;
                bestDisplay.innerText = moves;
                saveScores(); // Save to Local Storage on new best
            }

            document.getElementById('finalMoves').innerText = moves;
            document.getElementById('finalTime').innerText = timerDisplay.innerText;
            
            setTimeout(() => {
                document.getElementById('winModal').style.display = 'flex';
            }, 800);
        }

        function closeModal() {
            document.getElementById('winModal').style.display = 'none';
            initGame(true);
        }

        window.onload = () => {
            loadSavedData();
            initGame(true);
        };
        
        let resizeTimer;
        window.onresize = () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                setupBoard(false);
            }, 100);
        };
    </script>
</body>
</html>
